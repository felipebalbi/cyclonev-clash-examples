###############################################################################
#
# Required tooling for targeting the Terasic Cyclone V GX Starter Kit (C5G,
# Intel/Altera 5CGXFC5C6F27C7N) with Quartus Prime Lite.
#
# Don't modify this file directly. Instead, copy it to `build.cfg.local` and
# introduce any required changes there (build.cfg.local takes precedence and
# is gitignored).
#
# The QUARTUS_* tools ship with Quartus Prime Lite:
#   https://www.intel.com/content/www/us/en/software-kit/ (Quartus Prime Lite)
# Tested with Quartus 25.1std Lite. The Haskell side uses stack.
###############################################################################

# Quartus Prime Lite install. Override QUARTUS_BIN in build.cfg.local if your
# install lives elsewhere (or set it empty if quartus_* are already on PATH).
QUARTUS_BIN = $(HOME)/altera_lite/25.1std/quartus/bin

# Clash -> Verilog.
CLASH = stack run clash --

# Haskell unit tests.
TEST = stack test

# Quartus staged pipeline -- project gen, synth, fit, assemble, timing, program.
QUARTUS_SH  = $(QUARTUS_BIN)/quartus_sh
QUARTUS_MAP = $(QUARTUS_BIN)/quartus_map
QUARTUS_FIT = $(QUARTUS_BIN)/quartus_fit
QUARTUS_ASM = $(QUARTUS_BIN)/quartus_asm
QUARTUS_STA = $(QUARTUS_BIN)/quartus_sta
QUARTUS_PGM = $(QUARTUS_BIN)/quartus_pgm

###############################################################################
